services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: lifefocus
      POSTGRES_PASSWORD: lifefocus
      POSTGRES_DB: lifefocus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Host port configurable via POSTGRES_HOST_PORT env var (default: 5432).
      # Bound to loopback so the database is never exposed beyond this machine.
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifefocus -d lifefocus"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: apply DB migrations, then exit. Both hosts wait for it to complete
  # so the auth tables exist before any authed route serves (AD-9).
  migrate:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lifefocus:lifefocus@postgres:5432/lifefocus
      NODE_ENV: production
      # loadConfig() requires a valid secret even for the migrate runner.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-only-insecure-secret-change-me-32chars}
      # loadConfig() requires a valid 32-byte ledger master key (ADR 0001).
      LEDGER_MASTER_KEY: ${LEDGER_MASTER_KEY:-ZGV2LW9ubHktaW5zZWN1cmUtbGVkZ2VyLWtleS0zMmI=}
    restart: "no"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      # Host port configurable for machines where 3000 is taken; container always serves 3000
      - "${WEB_HOST_PORT:-3000}:3000"
    # env_file is optional — DATABASE_URL is set explicitly below for container networking.
    # .env is still read for other vars (LOG_LEVEL, etc.) but not required for the service to start.
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      # This DATABASE_URL intentionally overrides any value in .env:
      # inside the container network the hostname is 'postgres', not 'localhost'.
      DATABASE_URL: postgresql://lifefocus:lifefocus@postgres:5432/lifefocus
      # PORT must be 3000 to match the published port; set explicitly so a user PORT in .env can't break it.
      PORT: 3000
      # Pinned so a NODE_ENV=development in .env can't leak into the container (environment overrides env_file).
      NODE_ENV: production
      # Better Auth (AD-6). Provide a strong secret via .env in real use; the default is dev-only.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-only-insecure-secret-change-me-32chars}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      # Ledger crypto-shredding master key (ADR 0001).
      LEDGER_MASTER_KEY: ${LEDGER_MASTER_KEY:-ZGV2LW9ubHktaW5zZWN1cmUtbGVkZ2VyLWtleS0zMmI=}
      # Google Calendar OAuth (data-source connection, Story 1.4). Optional —
      # empty by default so the app boots + gates; connect flow disabled until set.
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      # Same intentional override — see web service comment above.
      DATABASE_URL: postgresql://lifefocus:lifefocus@postgres:5432/lifefocus
      # Pinned so a NODE_ENV=development in .env can't leak into the container (environment overrides env_file).
      NODE_ENV: production
      # loadConfig() requires a valid secret in every host process.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-only-insecure-secret-change-me-32chars}
      # Ledger crypto-shredding master key (ADR 0001).
      LEDGER_MASTER_KEY: ${LEDGER_MASTER_KEY:-ZGV2LW9ubHktaW5zZWN1cmUtbGVkZ2VyLWtleS0zMmI=}
      # Google Calendar OAuth (Story 1.4). The worker's sync jobs are registered
      # only when these are set; otherwise the worker runs without calendar sync.
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}

volumes:
  postgres_data:
